---
layout: single
title: ZJU嗨玩榜
permalink: /zju-fun/
author_profile: false
---

<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;flex-wrap:wrap;gap:1rem;">
  <h2 class="section-title" style="margin:0;"><i class="fas fa-map-marker-alt" style="color:var(--danger-color);"></i> ZJU嗨玩榜</h2>
  <a href="https://github.com/{{ site.github_username }}/{{ site.github_repo }}/issues/new?assignees={{ site.github_username }}&labels=recommendation&template=recommend-place.yml&title=%5B%E6%8E%A8%E8%8D%90%5D+"
     target="_blank" rel="noopener" class="btn btn-primary" style="font-size:0.9rem;">
    <i class="fas fa-plus-circle"></i> 我要推荐
  </a>
</div>
<p style="color:var(--text-light);margin-bottom:2rem;line-height:1.7;">浙大紫金港校区附近吃喝玩乐好去处，由同学们亲身体验推荐。点击地址可跳转高德地图导航。</p>

<!-- TOP5 排行榜 -->
<h3 style="font-size:1.2rem;margin-bottom:1rem;"><i class="fas fa-crown" style="color:var(--accent-color);"></i> TOP 5 排行榜</h3>
<div id="top5-container" class="top5-grid"></div>

<hr style="margin:2.5rem 0;border:none;border-top:1px solid var(--border-color);">

<!-- 筛选栏 -->
<div class="filter-bar">
  <div class="filter-group">
    <label>分类：</label>
    <select id="fun-category-filter">
      <option value="all">全部分类</option>
      <option value="美食">美食</option>
      <option value="外卖">外卖</option>
      <option value="奶茶咖啡">奶茶咖啡</option>
      <option value="约会聚餐">约会聚餐</option>
      <option value="景点">景点</option>
      <option value="娱乐">娱乐</option>
      <option value="超市便利店">超市便利店</option>
    </select>
  </div>
  <div class="filter-group">
    <label>排序：</label>
    <select id="fun-sort-filter">
      <option value="rating">最高评分</option>
      <option value="date">最新推荐</option>
    </select>
  </div>
  <div class="search-box" style="position:relative;">
    <input type="text" id="fun-search" placeholder="搜索名称、地址、标签..." autocomplete="off">
    <button id="fun-search-btn"><i class="fas fa-search"></i></button>
    <button id="fun-history-btn" title="搜索历史" style="margin-left:4px;background:var(--bg-alt);border:1px solid var(--border-color);border-radius:8px;padding:0 10px;cursor:pointer;color:var(--text-light);"><i class="fas fa-history"></i></button>
    <div id="fun-suggestions" class="search-suggestions" style="display:none;"></div>
    <div id="fun-history-dropdown" class="search-suggestions" style="display:none;"></div>
  </div>
</div>

<!-- 结果统计 -->
<div id="fun-count" style="margin-bottom:1rem;color:var(--text-light);font-size:0.9rem;"></div>

<!-- 卡片网格 -->
<div class="fun-grid" id="fun-grid"></div>

<!-- 无结果 -->
<div class="state-message" id="fun-no-results" style="display:none;">
  <i class="fas fa-search"></i>
  <p>没有找到匹配的地点，试试其他关键词？</p>
</div>

<!-- 嵌入数据 -->
<script>
const allPlaces = [
  {% for p in site.data.zju-fun %}
  {
    "id": {{ p.id }},
    "name": "{{ p.name | escape }}",
    "category": "{{ p.category }}",
    "subcategory": "{{ p.subcategory }}",
    "rating": {{ p.rating }},
    "like_count": {{ p.like_count }},
    "address": "{{ p.address | escape }}",
    "description": "{{ p.description | escape }}",
    "recommender": "{{ p.recommender | escape }}",
    "date": "{{ p.date }}",
    "image": "{{ p.image }}",
    "tags": {{ p.tags | jsonify }},
    "opening_hours": "{{ p.opening_hours | escape }}",
    "price": "{{ p.price | escape }}"
  }{% unless forloop.last %},{% endunless %}
  {% endfor %}
];
</script>
<script src="{{ '/assets/js/favorites.js' | relative_url }}"></script>
<script>
(function() {
  /* ============================================================
     Report URL helper
     ============================================================ */
  var TLS_GITHUB_REPO_URL = 'https://github.com/sitisaniyah-art/The-Last-Supper';
  function reportUrl(type, title) {
    return TLS_GITHUB_REPO_URL + '/issues/new?template=report.yml&title=' + encodeURIComponent('[举报] ' + type + ' - ' + title);
  }

  /* ============================================================
     Star rendering
     ============================================================ */
  function stars(rating) {
    var h = '';
    for (var i = 1; i <= 5; i++) {
      h += '<i class="fas fa-star zj-star' + (i <= Math.round(rating) ? ' filled' : '') + '"></i>';
    }
    return h;
  }

  /* ============================================================
     Category accent colors
     ============================================================ */
  var CAT_COLORS = {
    '美食': '#ef4444',
    '外卖': '#f97316',
    '奶茶咖啡': '#8b5cf6',
    '景点': '#10b981',
    '娱乐': '#f59e0b',
    '超市便利店': '#06b6d4',
    '约会聚餐': '#ec4899'
  };
  var CAT_ICONS = {
    '美食': 'fa-utensils',
    '外卖': 'fa-motorcycle',
    '奶茶咖啡': 'fa-mug-hot',
    '景点': 'fa-camera-retro',
    '娱乐': 'fa-gamepad',
    '超市便利店': 'fa-store',
    '约会聚餐': 'fa-heart'
  };

  /* ============================================================
     TOP5 rendering
     ============================================================ */
  function renderTop5() {
    var sorted = allPlaces.slice().sort(function(a, b) { return b.rating - a.rating; }).slice(0, 5);
    var container = document.getElementById('top5-container');
    container.innerHTML = sorted.map(function(p, idx) {
      var rank = idx + 1;
      var color = CAT_COLORS[p.category] || '#6b7280';
      var medal = rank === 1 ? 'fa-crown' : rank <= 3 ? 'fa-medal' : 'fa-trophy';
      return '<div class="top5-item">' +
        '<div class="top5-rank rank-' + rank + '"><i class="fas ' + medal + '"></i> ' + rank + '</div>' +
        '<div class="top5-info">' +
          '<strong>' + p.name + '</strong>' +
          '<div class="top5-meta">' +
            '<span class="zj-tag" style="background:' + color + '15;color:' + color + ';">' + p.category + '</span>' +
            '<span class="zj-rating-sm">' + stars(p.rating) + ' <b>' + p.rating + '</b></span>' +
          '</div>' +
        '</div>' +
        '<span class="top5-price">' + p.price + '</span>' +
      '</div>';
    }).join('');
  }

  /* ============================================================
     Image carousel helpers
     ============================================================ */
  function getImages(placeId) {
    try {
      var stored = JSON.parse(localStorage.getItem('tls_zju_images')) || {};
      if (stored[String(placeId)] && stored[String(placeId)].length > 0) {
        return stored[String(placeId)].slice(0, 5);
      }
    } catch(e) {}
    var place = allPlaces.find(function(p) { return p.id === placeId; });
    return place ? [place.image] : [];
  }

  function buildImageCarousel(placeId, name) {
    var images = getImages(placeId);
    if (!images.length) images = ['https://picsum.photos/600/400?random=' + placeId];
    if (images.length <= 1) {
      return '<img src="' + images[0] + '" alt="' + name + '" loading="lazy" onerror="this.onerror=null;this.src=\'https://picsum.photos/600/400?random=' + placeId + '\'">';
    }
    var dots = images.map(function(_, i) {
      return '<span class="zj-img-dot' + (i === 0 ? ' active' : '') + '" data-idx="' + i + '"></span>';
    }).join('');
    return '<div class="zj-carousel" data-place="' + placeId + '" data-current="0">' +
      '<img src="' + images[0] + '" alt="' + name + '" class="zj-carousel-img" loading="lazy">' +
      '<button class="zj-carousel-prev"><i class="fas fa-chevron-left"></i></button>' +
      '<button class="zj-carousel-next"><i class="fas fa-chevron-right"></i></button>' +
      '<div class="zj-carousel-dots">' + dots + '</div>' +
      '<span class="zj-carousel-count"><i class="fas fa-images"></i> ' + images.length + '</span>' +
    '</div>';
  }

  /* ============================================================
     Card rendering
     ============================================================ */
  function buildCard(p) {
    var color = CAT_COLORS[p.category] || '#6b7280';
    var icon = CAT_ICONS[p.category] || 'fa-map-pin';
    var tagsHtml = p.tags.map(function(t) { return '<span class="tag">' + t + '</span>'; }).join('');
    var mapUrl = 'https://uri.amap.com/marker?position=&name=' + encodeURIComponent(p.name) + '&address=' + encodeURIComponent(p.address);

    return '<div class="zj-card">' +
      '<div class="zj-card-img">' +
        buildImageCarousel(p.id, p.name) +
        '<div class="zj-card-img-overlay">' +
          '<span class="zj-tag" style="background:' + color + ';color:#fff;"><i class="fas ' + icon + '"></i> ' + p.category + '</span>' +
        '</div>' +
      '</div>' +
      '<div class="zj-card-body">' +
        '<h3 class="zj-card-title">' + p.name + '</h3>' +
        '<div class="zj-card-rating">' + stars(p.rating) + '<span class="zj-rating-num">' + p.rating + '</span></div>' +
        '<a class="zj-card-address" href="' + mapUrl + '" target="_blank" rel="noopener" title="在高德地图中打开导航">' +
          '<i class="fas fa-map-marker-alt"></i> ' + p.address +
        '</a>' +
        '<p class="zj-card-desc">' + p.description + '</p>' +
        '<div class="zj-card-details">' +
          '<span><i class="fas fa-clock"></i> ' + p.opening_hours + '</span>' +
          '<span><i class="fas fa-yen-sign"></i> ' + p.price + '</span>' +
        '</div>' +
        '<div class="zj-card-tags">' + tagsHtml + '</div>' +
      '</div>' +
      '<div class="zj-card-footer">' +
        '<span class="zj-card-recommender"><i class="fas fa-user-circle"></i> ' + p.recommender + ' · ' + p.date + '</span>' +
        '<div class="zj-card-actions">' +
          '<button class="zj-action-btn zj-share-btn" data-id="' + p.id + '" data-name="' + encodeURIComponent(p.name) + '" data-tooltip="分享"><i class="fas fa-share-alt"></i></button>' +
          '<a href="' + reportUrl('嗨玩榜推荐', p.name) + '" class="zj-action-btn zj-report-btn" target="_blank" rel="noopener" data-tooltip="举报"><i class="fas fa-flag"></i></a>' +
        '</div>' +
      '</div>' +
    '</div>';
  }

  /* ============================================================
     Filter + Sort + Search
     ============================================================ */
  function filterAndSort() {
    var cat  = document.getElementById('fun-category-filter').value;
    var sort = document.getElementById('fun-sort-filter').value;
    var term = document.getElementById('fun-search').value.toLowerCase().trim();

    var result = allPlaces.filter(function(p) {
      var matchCat = cat === 'all' || p.category === cat;
      var matchSearch = term === '' ||
        p.name.toLowerCase().includes(term) ||
        p.address.toLowerCase().includes(term) ||
        p.description.toLowerCase().includes(term) ||
        (p.tags && p.tags.some(function(t) { return t.toLowerCase().includes(term); }));
      return matchCat && matchSearch;
    });

    if (sort === 'rating')      result.sort(function(a, b) { return b.rating - a.rating; });
    else if (sort === 'date')   result.sort(function(a, b) { return new Date(b.date) - new Date(a.date); });

    renderGrid(result);
  }

  function renderGrid(places) {
    var grid = document.getElementById('fun-grid');
    var empty = document.getElementById('fun-no-results');
    var countEl = document.getElementById('fun-count');

    if (places.length === 0) {
      grid.innerHTML = '';
      empty.style.display = 'block';
      countEl.textContent = '';
      return;
    }

    empty.style.display = 'none';
    countEl.textContent = '共 ' + places.length + ' 个推荐';
    grid.innerHTML = places.map(buildCard).join('');
    bindEvents(grid);
  }

  /* ============================================================
     Carousel navigation
     ============================================================ */
  function _carouselGoTo(carousel, idx) {
    var images = getImages(parseInt(carousel.dataset.place));
    if (!images.length || idx < 0 || idx >= images.length) return;
    carousel.dataset.current = idx;
    var img = carousel.querySelector('.zj-carousel-img');
    if (img) { img.style.opacity = '0'; setTimeout(function() { img.src = images[idx]; img.style.opacity = '1'; }, 150); }
    carousel.querySelectorAll('.zj-img-dot').forEach(function(d, i) { d.classList.toggle('active', i === idx); });
  }
  function _carouselGo(carousel, dir) {
    var images = getImages(parseInt(carousel.dataset.place));
    var current = parseInt(carousel.dataset.current) || 0;
    var next = (current + dir + images.length) % images.length;
    _carouselGoTo(carousel, next);
  }

  /* ============================================================
     Event binding
     ============================================================ */
  function bindEvents(container) {
    // Carousel buttons
    container.querySelectorAll('.zj-carousel-prev').forEach(function(btn) {
      btn.addEventListener('click', function(e) {
        e.preventDefault(); e.stopPropagation();
        var carousel = this.closest('.zj-carousel');
        _carouselGo(carousel, -1);
      });
    });
    container.querySelectorAll('.zj-carousel-next').forEach(function(btn) {
      btn.addEventListener('click', function(e) {
        e.preventDefault(); e.stopPropagation();
        var carousel = this.closest('.zj-carousel');
        _carouselGo(carousel, 1);
      });
    });
    container.querySelectorAll('.zj-img-dot').forEach(function(dot) {
      dot.addEventListener('click', function(e) {
        e.preventDefault(); e.stopPropagation();
        var carousel = this.closest('.zj-carousel');
        var idx = parseInt(this.dataset.idx);
        _carouselGoTo(carousel, idx);
      });
    });
    // Touch swipe
    container.querySelectorAll('.zj-carousel').forEach(function(carousel) {
      var startX = 0;
      carousel.addEventListener('touchstart', function(e) { startX = e.touches[0].clientX; }, { passive: true });
      carousel.addEventListener('touchend', function(e) {
        var diff = e.changedTouches[0].clientX - startX;
        if (Math.abs(diff) > 40) _carouselGo(carousel, diff < 0 ? 1 : -1);
      }, { passive: true });
    });

    // Share buttons
    container.querySelectorAll('.zj-share-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var name = decodeURIComponent(this.getAttribute('data-name'));
        var url = window.location.href;
        var text = '浙大嗨玩榜推荐：' + name + ' — 来自最后的晚餐学习社区';
        if (navigator.share) {
          navigator.share({ title: name, text: text, url: url }).catch(function() {});
        } else {
          // Fallback: copy to clipboard
          var dummy = document.createElement('textarea');
          dummy.value = text + '\n' + url;
          document.body.appendChild(dummy);
          dummy.select();
          document.execCommand('copy');
          document.body.removeChild(dummy);
          alert('链接已复制到剪贴板！');
        }
      });
    });
  }

  /* ============================================================
     Init
     ============================================================ */
  document.addEventListener('DOMContentLoaded', function() {
    renderTop5();
    filterAndSort();

    document.getElementById('fun-category-filter').addEventListener('change', filterAndSort);
    document.getElementById('fun-sort-filter').addEventListener('change', filterAndSort);
    document.getElementById('fun-search').addEventListener('input', filterAndSort);

    // Search suggestions & history
    var searchInput = document.getElementById('fun-search');
    var suggestionsEl = document.getElementById('fun-suggestions');
    var historyDropdown = document.getElementById('fun-history-dropdown');
    var historyBtn = document.getElementById('fun-history-btn');
    var debounceTimer = null;

    if (typeof TLSearch !== 'undefined') {
      searchInput.addEventListener('input', function() {
        clearTimeout(debounceTimer);
        var val = this.value;
        debounceTimer = setTimeout(function() {
          if (!val || val.length < 1) { suggestionsEl.style.display = 'none'; return; }
          var results = TLSearch.suggest(val);
          var placeResults = allPlaces.filter(function(p) {
            return (p.name || '').toLowerCase().includes(val.toLowerCase()) ||
                   (p.address || '').toLowerCase().includes(val.toLowerCase());
          }).slice(0, 3);
          placeResults.forEach(function(p) {
            results.push({ text: p.name, type: 'place', icon: 'fa-map-marker-alt' });
          });
          // Deduplicate
          var seen = {};
          var unique = [];
          results.forEach(function(s) { if (!seen[s.text]) { seen[s.text] = true; unique.push(s); } });
          if (unique.length === 0) { suggestionsEl.style.display = 'none'; return; }
          suggestionsEl.innerHTML = unique.slice(0, 5).map(function(s) {
            return '<div class="search-suggestion-item" data-text="' + s.text.replace(/"/g, '&quot;') + '">' +
              '<i class="fas ' + s.icon + '" style="width:16px;color:var(--text-lighter);"></i> ' +
              TLSearch.highlightMatch(s.text, val) +
            '</div>';
          }).join('');
          suggestionsEl.style.display = 'block';
          suggestionsEl.querySelectorAll('.search-suggestion-item').forEach(function(item) {
            item.addEventListener('mousedown', function(e) {
              e.preventDefault();
              searchInput.value = this.dataset.text;
              suggestionsEl.style.display = 'none';
              filterAndSort();
              TLSearch.addToHistory(this.dataset.text);
            });
          });
        }, 200);
      });

      // History button
      historyBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        if (historyDropdown.style.display === 'block') { historyDropdown.style.display = 'none'; return; }
        suggestionsEl.style.display = 'none';
        var hist = TLSearch.getHistory();
        if (hist.length === 0) {
          historyDropdown.innerHTML = '<div class="search-suggestion-item" style="color:var(--text-lighter);">暂无搜索历史</div>';
        } else {
          historyDropdown.innerHTML = '<div class="search-suggestion-item" style="justify-content:space-between;"><span style="color:var(--text-lighter);font-size:.8rem;">搜索历史</span><span class="search-clear-history" style="cursor:pointer;color:var(--danger-color);font-size:.8rem;">清除</span></div>' +
            hist.map(function(h) {
              return '<div class="search-suggestion-item" data-text="' + h.replace(/"/g, '&quot;') + '">' +
                '<i class="fas fa-clock" style="width:16px;color:var(--text-lighter);"></i> ' + h +
              '</div>';
            }).join('');
          var clearBtn = historyDropdown.querySelector('.search-clear-history');
          if (clearBtn) clearBtn.addEventListener('click', function(ev) {
            ev.stopPropagation();
            TLSearch.clearHistory();
            historyDropdown.style.display = 'none';
          });
        }
        historyDropdown.style.display = 'block';
        historyDropdown.querySelectorAll('.search-suggestion-item[data-text]').forEach(function(item) {
          item.addEventListener('mousedown', function(ev) {
            ev.preventDefault();
            searchInput.value = this.dataset.text;
            historyDropdown.style.display = 'none';
            filterAndSort();
          });
        });
      });

      // Save to history on search
      searchInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
          suggestionsEl.style.display = 'none';
          TLSearch.addToHistory(this.value);
        }
      });

      document.addEventListener('click', function() {
        suggestionsEl.style.display = 'none';
        historyDropdown.style.display = 'none';
      });
    }
  });
})();
</script>
<script src="{{ '/assets/js/search-enhanced.js' | relative_url }}"></script>
<script src="{{ '/assets/js/search-agent.js' | relative_url }}"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
  if (typeof SearchAgent !== 'undefined') SearchAgent.init();
});
</script>
