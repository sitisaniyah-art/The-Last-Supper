name: 提交学习资源
description: 提交学习资料、课件、笔记等资源
title: "[资源] "
labels: ["resource-submission"]
assignees:
  - sitisaniyah-art

body:
  - type: markdown
    attributes:
      value: |
        感谢你分享学习资源！请填写以下信息，审核通过后会自动添加到资源页面。

  - type: input
    id: resource-title
    attributes:
      label: 资源标题
      placeholder: 例如：高等数学期末复习笔记
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: 学科大类
      options:
        - 数学与统计类
        - 计算机科学与技术类
        - 电子信息与电气工程类
        - 机械与能源工程类
        - 材料科学与工程类
        - 物理学类
        - 化学与化工类
        - 生命科学与医学类
        - 地球与空间科学类
        - 土木水利与建筑类
        - 交通运输与航空航天类
        - 环境与安全科学类
        - 农学与食品科学类
        - 经济与管理类
        - 法学与政治学类
        - 人文与教育类
        - 艺术与设计类
        - 交叉学科类
        - 公共基础类
        - 综合类
    validations:
      required: true

  - type: dropdown
    id: subcategory
    attributes:
      label: 具体课程
      options:
        - 基础数学
        - 应用数学
        - 概率与统计
        - 工程数学
        - 其他数学
        - 计算机基础
        - 编程语言与开发
        - 软件工程
        - 人工智能与数据科学
        - 系统与安全
        - 计算机应用
        - 其他计算机
        - 电路与电子技术
        - 信号与信息处理
        - 电气工程
        - 电子科学与技术
        - 控制科学与工程
        - 通信工程
        - 其他电子信息
        - 力学基础
        - 机械设计与制造
        - 机电一体化
        - 能源与动力工程
        - 车辆与运载工程
        - 其他机械能源
        - 材料基础
        - 金属材料
        - 无机非金属材料
        - 高分子材料
        - 复合材料
        - 功能材料
        - 其他材料
        - 基础物理
