name: 提交学习资源
description: 提交学习资料、课件、笔记等资源
title: "[资源] "
labels: ["resource-submission"]
assignees:
  - sitisaniyah-art

body:
  - type: markdown
    attributes:
      value: |
        感谢你分享学习资源！请填写以下信息，审核通过后会自动添加到资源页面。

  - type: input
    id: resource-title
    attributes:
      label: 资源标题
      placeholder: 例如：高等数学期末复习笔记
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: 学科分类
      options:
        - 数学
        - 编程
        - 英语
        - 物理
        - 电子信息
        - 工程技术
        - 人文社科
        - 其他
    validations:
      required: true

  - type: dropdown
    id: subcategory
    attributes:
      label: 子分类
      options:
        - 高等数学
        - 线性代数
        - 概率论与数理统计
        - 离散数学
        - 数值分析
        - 复变函数与积分变换
        - 其他数学
        - Python
        - C/C++
        - Java
        - 数据结构与算法
        - 操作系统
        - 计算机网络
        - 数据库
        - 机器学习
        - 深度学习
        - 计算机视觉
        - 自然语言处理
        - 其他计算机
        - 四级
        - 六级
        - 考研英语
        - 口语
        - 听力
        - 其他英语
        - 大学物理
        - 力学
        - 电磁学
        - 光学
        - 热学
        - 其他物理
        - 电路原理
        - 模拟电子技术
        - 数字电子技术
        - 信号与系统
        - 数字信号处理
        - 自动控制原理
        - 其他电子信息
        - 理论力学
        - 材料力学
        - 机械原理
        - 机械设计
        - 工程制图
        - 工程热力学
        - 流体力学
        - 传热学
        - 其他工程
        - 马克思主义基本原理
        - 毛泽东思想和中国特色社会主义理论体系概论
        - 中国近现代史纲要
        - 思想道德与法治
        - 其他人文学科
        - 其他学科
    validations:
      required: true

  - type: dropdown
    id: grade
    attributes:
      label: 适用年级
      options:
        - 大一
        - 大二
        - 大三
        - 大四
        - 通用
    validations:
      required: true

  - type: dropdown
    id: type
    attributes:
      label: 资源类型
      options:
        - 真题
        - 课件
        - 笔记
        - 习题
        - 书籍
        - 视频
        - 其他
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: 资源描述
      description: 简单描述资源内容、适合哪些同学、有什么特色
      placeholder: 例如：包含高数上下册所有知识点整理，适合期末复习使用...
    validations:
      required: true

  - type: input
    id: link
    attributes:
      label: 资源链接
      description: 资源的下载或访问地址（百度网盘、GitHub Release、在线播放链接等）
      placeholder: https://...
    validations:
      required: true

  - type: input
    id: tags
    attributes:
      label: 标签
      description: 用逗号分隔的关键词
      placeholder: 例如：期末,复习,高数
    validations:
      required: false

  - type: input
    id: nickname
    attributes:
      label: 你的昵称（可选）
      placeholder: 匿名
    validations:
      required: false
