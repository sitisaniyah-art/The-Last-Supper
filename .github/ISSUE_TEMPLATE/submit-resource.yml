  - type: dropdown
    id: grade
    attributes:
      label: 适用年级
      options:
        - 大一
        - 大二
        - 大三
        - 大四
        - 通用
    validations:
      required: true

  - type: dropdown
    id: type
    attributes:
      label: 资源类型
      options:
        - 视频课程
        - 课件讲义
        - 书籍
        - 习题试卷
        - 其他
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: 资源描述
      description: 简单描述资源内容、适合哪些同学、有什么特色
      placeholder: 例如：包含高数上下册所有知识点整理，适合期末复习使用...
    validations:
      required: true

  - type: input
    id: link
    attributes:
      label: 资源链接
      description: 资源的下载或访问地址（百度网盘、GitHub Release、在线播放链接等）
      placeholder: https://...
    validations:
      required: true

  - type: input
    id: tags
    attributes:
      label: 标签
      description: 用逗号分隔的关键词
      placeholder: 例如：期末,复习,高数
    validations:
      required: false

  - type: input
    id: nickname
    attributes:
      label: 你的昵称（可选）
      placeholder: 匿名
    validations:
      required: false
