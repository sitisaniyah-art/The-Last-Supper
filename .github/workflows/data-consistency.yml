name: 数据一致性检查

on:
  schedule:
    # 每周一 UTC 2:00（北京时间 10:00）
    - cron: '0 2 * * 1'
  workflow_dispatch: # 允许手动触发

jobs:
  check:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 运行一致性检查
        id: check
        run: node .github/scripts/check-consistency.js

      - name: 提交修复
        if: steps.check.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _data/
          git diff --staged --quiet || {
            git commit -m "fix: 自动修复数据一致性问题 [skip ci]"
            git push
          }
