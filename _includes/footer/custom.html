    </a>

      <i class="fas fa-book"></i> 使用指南
    </a>
  </p>
  <button id="dark-mode-toggle" aria-label="切换暗黑模式" style="background:none;border:1px solid var(--border-color,#ccc);border-radius:4px;padding:4px 10px;cursor:pointer;font-size:1rem;margin-top:0.5rem;">
    <i class="fas fa-moon"></i> 暗黑模式
  </button>
</div>
<script>
(function(){
  var btn=document.getElementById('dark-mode-toggle');
  if(!btn) return;
  function update(){
    var dark=document.documentElement.getAttribute('data-theme')==='dark';
    btn.innerHTML=dark?'<i class="fas fa-sun"></i> 明亮模式':'<i class="fas fa-moon"></i> 暗黑模式';
  }
  update();
  btn.addEventListener('click',function(){
    var dark=document.documentElement.getAttribute('data-theme')==='dark';
    if(dark){
      document.documentElement.removeAttribute('data-theme');
      localStorage.setItem('theme','light');
    }else{
      document.documentElement.setAttribute('data-theme','dark');
      localStorage.setItem('theme','dark');
    }
    update();
  });
})();
</script>
