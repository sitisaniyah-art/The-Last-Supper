<div style="text-align: center; margin-top: 1rem;">
  <p>
    <a href="https://github.com/sitisaniyah-art/The-Last-Supper" target="_blank" rel="noopener">
      <i class="fab fa-github"></i> GitHub 仓库
    </a>
    &nbsp;|&nbsp;
    <a href="{{ '/contribute/' | relative_url }}">
      <i class="fas fa-hands-helping"></i> 贡献资源
    </a>
    &nbsp;|&nbsp;
    <a href="{{ '/guide/' | relative_url }}">
      <i class="fas fa-book"></i> 使用指南
    </a>
  </p>
  <div style="display:inline-flex;gap:0.75rem;align-items:center;margin-top:0.5rem;flex-wrap:wrap;justify-content:center;">
    <button id="dark-mode-toggle" aria-label="切换暗黑模式" style="background:none;border:1px solid var(--border-color,#ccc);border-radius:4px;padding:4px 10px;cursor:pointer;font-size:1rem;">
      <i class="fas fa-moon"></i> 暗黑模式
    </button>
    <span id="auth-user-area"></span>
  </div>
</div>
<script>
(function(){
  // Dark mode toggle
  var btn=document.getElementById('dark-mode-toggle');
  if(btn){
    function update(){
      var dark=document.documentElement.getAttribute('data-theme')==='dark';
      btn.innerHTML=dark?'<i class="fas fa-sun"></i> 明亮模式':'<i class="fas fa-moon"></i> 暗黑模式';
    }
    update();
    btn.addEventListener('click',function(){
      var dark=document.documentElement.getAttribute('data-theme')==='dark';
      if(dark){
        document.documentElement.removeAttribute('data-theme');
        localStorage.setItem('theme','light');
      }else{
        document.documentElement.setAttribute('data-theme','dark');
        localStorage.setItem('theme','dark');
      }
      update();
    });
  }

  // Auth UI
  window.updateAuthUI=function(){
    var area=document.getElementById('auth-user-area');
    if(!area) return;
    if(typeof Auth==='undefined'){
      area.innerHTML='<button class="auth-btn" onclick="window.showAuthModal&&showAuthModal()"><i class="fas fa-sign-in-alt"></i> 登录</button>';
      return;
    }
    if(Auth.isLoggedIn()){
      var av=Auth.getAvatar()||'';
      var un=Auth.getUsername()||'';
      area.innerHTML=
        '<span class="auth-user-info">'+
          '<img src="'+av+'" alt="'+un+'" class="auth-avatar" width="24" height="24" loading="lazy">'+
          '<span class="auth-username">'+un.replace(/</g,'&lt;')+'</span>'+
          '<button class="auth-logout-btn" onclick="Auth.logout();updateAuthUI();" title="退出登录"><i class="fas fa-sign-out-alt"></i></button>'+
        '</span>';
    }else{
      area.innerHTML='<button class="auth-btn" onclick="window.showAuthModal&&showAuthModal()"><i class="fas fa-sign-in-alt"></i> 登录</button>';
    }
  };
  updateAuthUI();
})();
</script>
