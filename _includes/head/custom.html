<!-- Site-wide announcement bar -->
<script>
(function(){
  var announcements=[
    {% assign sorted_announcements = site.data.announcements | sort: "date" | reverse %}
    {% for a in sorted_announcements %}
    {"title":"{{ a.title | escape }}","date":"{{ a.date }}","content":"{{ a.content | escape }}","pinned":{{ a.pinned | default: false }}}{% unless forloop.last %},{% endunless %}
    {% endfor %}
  ];
  if(!announcements.length) return;

  var STORAGE_KEY='tls_announcement_dismissed';

  function getDismissed(){
    try{return JSON.parse(localStorage.getItem(STORAGE_KEY))||{};}catch(e){return{};}
  }
  function saveDismissed(d){
    localStorage.setItem(STORAGE_KEY,JSON.stringify(d));
  }

  // Pick best announcement: pinned first, then most recent
  var pinned=announcements.filter(function(a){return a.pinned;});
  var best=pinned.length?pinned[0]:announcements[0];

  // Check dismissal
  var dismissed=getDismissed();
  var now=Date.now();

  if(best.pinned){
    // Pinned: dismissed only if same title dismissed within 24h
    var pk='pinned_'+best.title;
    if(dismissed[pk]&&(now-dismissed[pk]<24*60*60*1000)) return;
  }else{
    // Regular: any dismissal within 24h hides it
    if(dismissed._last&&(now-dismissed._last<24*60*60*1000)) return;
  }

  // Build bar HTML
  var pinnedIcon=best.pinned?'<i class="fas fa-bullhorn tls-announcement-icon"></i>':'<i class="fas fa-info-circle tls-announcement-icon"></i>';
  var html='<div id="tls-announcement-bar" class="tls-announcement-bar'+(best.pinned?' tls-announcement-pinned':'')+'">'+
    '<div class="tls-announcement-inner">'+
      pinnedIcon+
      '<span class="tls-announcement-text"><strong>'+best.title+'</strong> — '+best.content+'</span>'+
      '<button id="tls-announcement-close" class="tls-announcement-close" aria-label="关闭公告">'+
        '<i class="fas fa-times"></i>'+
      '</button>'+
    '</div>'+
  '</div>';

  // Inject as early as possible
  function inject(){
    document.body.insertAdjacentHTML('afterbegin',html);
    document.body.classList.add('has-announcement-bar');

    document.getElementById('tls-announcement-close').addEventListener('click',function(){
      var bar=document.getElementById('tls-announcement-bar');
      bar.style.transform='translateY(-100%)';
      bar.style.opacity='0';
      setTimeout(function(){
        bar.remove();
        document.body.classList.remove('has-announcement-bar');
      },300);

      var d=getDismissed();
      d._last=now;
      if(best.pinned) d['pinned_'+best.title]=now;
      saveDismissed(d);
    });
  }

  if(document.body) inject();
  else document.addEventListener('DOMContentLoaded',inject);
})();
</script>
<!-- Scrolling ticker bar -->
<style>
#tls-ticker{position:fixed;top:0;left:0;width:100%;height:36px;background:var(--ticker-bg,linear-gradient(90deg,#4f46e5,#7c3aed));overflow:hidden;z-index:99980;display:flex;align-items:center;white-space:nowrap;box-shadow:0 1px 4px rgba(0,0,0,.12)}
#tls-ticker .tls-ticker-label{flex-shrink:0;background:rgba(255,255,255,.2);color:#fff;padding:0 12px;font-size:.75rem;font-weight:700;height:100%;display:flex;align-items:center;gap:4px;letter-spacing:.5px}
#tls-ticker .tls-ticker-track{flex:1;overflow:hidden;height:100%;position:relative}
#tls-ticker .tls-ticker-content{display:inline-flex;align-items:center;height:100%;animation:ticker-scroll var(--ticker-dur,40s) linear infinite}
#tls-ticker .tls-ticker-content:hover{animation-play-state:paused}
#tls-ticker .tls-ticker-item{color:#fff;font-size:.8rem;padding:0 24px;display:inline-flex;align-items:center;gap:6px;text-decoration:none;opacity:.95;transition:opacity .2s}
#tls-ticker .tls-ticker-item:hover{opacity:1;text-decoration:underline}
#tls-ticker .tls-ticker-sep{color:rgba(255,255,255,.35);font-size:.6rem}
body.has-ticker{padding-top:36px !important}
body.has-announcement-bar.has-ticker{padding-top:76px !important}
@keyframes ticker-scroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
[data-theme="dark"] #tls-ticker{background:var(--ticker-bg,linear-gradient(90deg,#312e81,#4c1d95));box-shadow:0 1px 4px rgba(0,0,0,.3)}
</style>
<script>
(function(){
  var items=[];
  // Pinned announcements
  {% assign pinned_a = site.data.announcements | where: "pinned", true %}
  {% for a in pinned_a %}
  items.push({"icon":"fa-bullhorn","text":"{{ a.title | escape }}","url":"{{ '/community/' | relative_url }}"});
  {% endfor %}

  // Latest 3 resources
  {% assign latest_res = site.data.resources | sort: "date" | reverse %}
  {% for r in latest_res limit:3 %}
  items.push({"icon":"fa-file-alt","text":"{{ r.title | escape }} ({{ r.category }})","url":"{{ '/resources/' | relative_url }}"});
  {% endfor %}

  // Top 3 popular resources
  {% assign popular_res = site.data.resources | sort: "downloads" | reverse %}
  {% for r in popular_res limit:3 %}
  items.push({"icon":"fa-fire","text":"热门：{{ r.title | escape }}","url":"{{ '/resources/' | relative_url }}"});
  {% endfor %}

  if(!items.length) return;

  function injectTicker(){
    var itemsHtml=items.map(function(item){
      return '<a class="tls-ticker-item" href="'+item.url+'"><i class="fas '+item.icon+'"></i> '+item.text+'</a><span class="tls-ticker-sep">|</span>';
    }).join('');
    // Duplicate for seamless loop
    var html='<div id="tls-ticker">'+
      '<div class="tls-ticker-label"><i class="fas fa-bell"></i> 动态</div>'+
      '<div class="tls-ticker-track"><div class="tls-ticker-content">'+itemsHtml+itemsHtml+'</div></div>'+
    '</div>';
    document.body.insertAdjacentHTML('afterbegin',html);
    document.body.classList.add('has-ticker');
    // Adjust duration based on content length
    var track=document.querySelector('#tls-ticker .tls-ticker-content');
    if(track){
      var totalW=track.scrollWidth/2;
      var dur=Math.max(20,Math.min(60,totalW/80));
      track.style.setProperty('--ticker-dur',dur+'s');
      track.style.animationDuration=dur+'s';
    }
  }
  if(document.body) injectTicker();
  else document.addEventListener('DOMContentLoaded',injectTicker);
})();
</script>
