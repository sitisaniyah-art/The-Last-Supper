---
layout: single
title: 疑问区
permalink: /questions/
author_profile: false
---

<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;flex-wrap:wrap;gap:1rem;">
  <h2 class="section-title" style="margin:0;"><i class="fas fa-comments"></i> 疑问区</h2>
  <a href="https://github.com/{{ site.github_username }}/{{ site.github_repo }}/issues/new?assignees={{ site.github_username }}&labels=question%2Cunanswered&template=ask-question.yml&title=%5B%E9%97%AE%E9%A2%98%5D+"
     target="_blank" rel="noopener" class="btn btn-primary">
    <i class="fas fa-question-circle"></i> 我要提问
  </a>
</div>

<!-- 筛选栏 -->
<div class="filter-bar">
  <div class="filter-group">
    <label>状态：</label>
    <select id="status-filter">
      <option value="all">全部问题</option>
      <option value="unanswered">待回答</option>
      <option value="answered">已回答</option>
    </select>
  </div>
  <div class="filter-group">
    <label>排序：</label>
    <select id="sort-filter">
      <option value="latest">最新发布</option>
      <option value="most-comments">最多讨论</option>
      <option value="oldest">最早发布</option>
    </select>
  </div>
  <div class="filter-group">
    <label>分类：</label>
    <select id="category-filter">
      <option value="all">全部分类</option>
      <option value="数学">数学</option>
      <option value="编程">编程</option>
      <option value="英语">英语</option>
      <option value="物理">物理</option>
      <option value="学习方法">学习方法</option>
      <option value="大学生活">大学生活</option>
      <option value="其他">其他</option>
    </select>
  </div>
  <div class="search-box">
    <input type="text" id="question-search" placeholder="搜索问题...">
    <button><i class="fas fa-search"></i></button>
  </div>
</div>

<!-- 问题计数 -->
<div id="question-count" style="margin-bottom:1rem;color:var(--text-light);font-size:0.9rem;"></div>

<!-- 问题列表 -->
<div class="questions-list" id="questions-list">
  <div class="state-message">
    <i class="fas fa-spinner fa-spin"></i>
    <p>正在加载问题...</p>
  </div>
</div>

<script>
const GITHUB_USERNAME = '{{ site.github_username }}';
const GITHUB_REPO = '{{ site.github_repo }}';

let allQuestions = [];

document.addEventListener('DOMContentLoaded', async () => {
  await loadQuestions();
  setupFilters();
});

async function loadQuestions() {
  try {
    // Check sessionStorage cache (valid for 5 min)
    const cacheKey = 'gh_questions_cache';
    const cached = sessionStorage.getItem(cacheKey);
    if (cached) {
      const { data, timestamp } = JSON.parse(cached);
      if (Date.now() - timestamp < 5 * 60 * 1000) {
        allQuestions = data;
        renderQuestions(allQuestions);
        return;
      }
    }

    const response = await fetch(
      `https://api.github.com/repos/${GITHUB_USERNAME}/${GITHUB_REPO}/issues?labels=question&state=open&per_page=100`
    );

    if (response.status === 403) {
      throw new Error('API 速率限制，请稍后再试');
    }
    if (!response.ok) {
      throw new Error('API 请求失败: ' + response.status);
    }

    allQuestions = await response.json();
    // Cache results
    sessionStorage.setItem(cacheKey, JSON.stringify({ data: allQuestions, timestamp: Date.now() }));
    renderQuestions(allQuestions);

  } catch (error) {
    console.error('加载问题失败:', error);
    document.getElementById('questions-list').innerHTML =
      '<div class="state-message"><i class="fas fa-exclamation-triangle"></i><p>' +
      error.message + '</p><p style="font-size:0.85rem;">你也可以直接 <a href="https://github.com/' +
      GITHUB_USERNAME + '/' + GITHUB_REPO + '/issues" target="_blank">在 GitHub 上查看</a></p></div>';
  }
}

function renderQuestions(questions) {
  var list = document.getElementById('questions-list');
  var countEl = document.getElementById('question-count');

  if (questions.length === 0) {
    list.innerHTML = '<div class="state-message"><i class="fas fa-comments"></i><p>暂无问题，快来成为第一个提问的人吧！</p></div>';
    countEl.textContent = '';
    return;
  }

  countEl.textContent = '共 ' + questions.length + ' 个问题';

  list.innerHTML = questions.map(function(q) {
    var isAnswered = q.labels.some(function(l) { return l.name === 'answered'; });
    var categoryLabel = q.labels.find(function(l) {
      return ['question', 'unanswered', 'answered'].indexOf(l.name) === -1;
    });
    var category = categoryLabel ? categoryLabel.name : '其他';

    var date = new Date(q.created_at).toLocaleDateString('zh-CN', {
      year: 'numeric', month: 'long', day: 'numeric'
    });

    var excerpt = (q.body || '').substring(0, 200).replace(/\n/g, ' ').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    var safeTitle = q.title.replace('[问题] ', '').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    var safeUser = (q.user.login || '').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    var safeCategory = category.replace(/</g, '&lt;').replace(/>/g, '&gt;');

    return '<div class="question-card">' +
      '<div class="question-status ' + (isAnswered ? 'answered' : 'unanswered') + '">' +
        (isAnswered ? '<i class="fas fa-check"></i> 已回答' : '<i class="fas fa-clock"></i> 待回答') +
      '</div>' +
      '<div class="question-content">' +
        '<h3 class="question-title"><a href="' + q.html_url + '" target="_blank" rel="noopener">' +
          safeTitle +
        '</a></h3>' +
        '<div class="question-meta">' +
          '<span><i class="fas fa-user"></i> ' + safeUser + '</span>' +
          '<span><i class="fas fa-calendar"></i> ' + date + '</span>' +
          '<span><i class="fas fa-comment"></i> ' + q.comments + ' 条讨论</span>' +
          '<span class="tag">' + safeCategory + '</span>' +
        '</div>' +
        '<p class="question-excerpt">' + excerpt + '...</p>' +
      '</div>' +
    '</div>';
  }).join('');
}

function setupFilters() {
  var statusFilter = document.getElementById('status-filter');
  var sortFilter = document.getElementById('sort-filter');
  var categoryFilter = document.getElementById('category-filter');
  var searchInput = document.getElementById('question-search');

  function applyFilters() {
    var status = statusFilter.value;
    var sort = sortFilter.value;
    var category = categoryFilter.value;
    var term = searchInput.value.toLowerCase().trim();

    var filtered = allQuestions.filter(function(q) {
      var isAnswered = q.labels.some(function(l) { return l.name === 'answered'; });
      var matchStatus = status === 'all' ||
        (status === 'answered' && isAnswered) ||
        (status === 'unanswered' && !isAnswered);

      var catLabel = q.labels.find(function(l) {
        return ['question', 'unanswered', 'answered'].indexOf(l.name) === -1;
      });
      var qCat = catLabel ? catLabel.name : '其他';
      var matchCat = category === 'all' || qCat === category;

      var matchSearch = term === '' ||
        q.title.toLowerCase().includes(term) ||
        (q.body || '').toLowerCase().includes(term);

      return matchStatus && matchCat && matchSearch;
    });

    // Sort
    if (sort === 'latest') {
      filtered.sort(function(a, b) { return new Date(b.created_at) - new Date(a.created_at); });
    } else if (sort === 'oldest') {
      filtered.sort(function(a, b) { return new Date(a.created_at) - new Date(b.created_at); });
    } else if (sort === 'most-comments') {
      filtered.sort(function(a, b) { return b.comments - a.comments; });
    }

    renderQuestions(filtered);
  }

  statusFilter.addEventListener('change', applyFilters);
  sortFilter.addEventListener('change', applyFilters);
  categoryFilter.addEventListener('change', applyFilters);
  searchInput.addEventListener('input', applyFilters);
}
</script>

<style>
.question-card {
  background-color: var(--card-bg);
  border-radius: var(--radius);
  padding: clamp(0.85rem, 1.5vw, 1.35rem) clamp(1rem, 2vw, 1.6rem);
  margin-bottom: clamp(0.6rem, 1vw, 1rem);
  box-shadow: var(--shadow);
  border: 1px solid var(--border-color);
  transition: var(--transition);
  display: flex;
  flex-wrap: wrap;
  gap: clamp(0.75rem, 1.5vw, 1.25rem);
  align-items: flex-start;
}

.question-card:hover {
  transform: translateY(-2px);
  box-shadow: var(--shadow-md);
  border-color: var(--primary-color);
}

.question-status {
  flex-shrink: 0;
  padding: clamp(4px, 0.6vw, 8px) clamp(8px, 1.2vw, 14px);
  border-radius: 20px;
  font-size: clamp(0.75rem, 0.9vw, 0.85rem);
  font-weight: 600;
  white-space: nowrap;
}

.question-status.answered {
  background-color: var(--success-color);
  color: #fff;
}

.question-status.unanswered {
  background-color: var(--warning-color);
  color: #fff;
}

.question-content {
  flex: 1;
  min-width: 0;
}

.question-title {
  font-size: clamp(0.95rem, 1.2vw, 1.12rem);
  font-weight: 600;
  margin-bottom: 0.5rem;
  line-height: 1.4;
}

.question-title a {
  color: var(--text-color);
  text-decoration: none;
  transition: var(--transition);
}

.question-title a:hover {
  color: var(--primary-color);
}

.question-meta {
  display: flex;
  flex-wrap: wrap;
  gap: clamp(0.5rem, 1vw, 1rem);
  margin-bottom: 0.5rem;
  font-size: clamp(0.78rem, 0.9vw, 0.88rem);
  color: var(--text-light);
}

.question-meta span {
  display: inline-flex;
  align-items: center;
  gap: 4px;
}

.question-excerpt {
  color: var(--text-light);
  line-height: 1.6;
  font-size: clamp(0.82rem, 1vw, 0.92rem);
  margin: 0;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

/* Collapse to stacked only at very small widths */
@media (max-width: 500px) {
  .question-card {
    flex-direction: column;
  }
  .question-status {
    align-self: flex-start;
  }
}
</style>
