---
layout: single
title: 学习资源
permalink: /resources/
author_profile: false
---

<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;flex-wrap:wrap;gap:1rem;">
  <h2 class="section-title" style="margin:0;"><i class="fas fa-book-open"></i> 学习资源库</h2>
  <a href="{{ '/contribute/' | relative_url }}" class="btn btn-primary" style="font-size:0.9rem;">
    <i class="fas fa-plus"></i> 贡献资源
  </a>
</div>

<!-- 筛选栏 -->
<div class="filter-bar">
  <div class="filter-group">
    <label>学科：</label>
    <select id="category-filter">
      <option value="all">全部学科</option>
      <option value="数学与统计类">数学与统计类</option>
      <option value="计算机科学与技术类">计算机科学与技术类</option>
      <option value="电子信息与电气工程类">电子信息与电气工程类</option>
      <option value="机械与能源工程类">机械与能源工程类</option>
      <option value="材料科学与工程类">材料科学与工程类</option>
      <option value="物理学类">物理学类</option>
      <option value="化学与化工类">化学与化工类</option>
      <option value="生命科学与医学类">生命科学与医学类</option>
      <option value="地球与空间科学类">地球与空间科学类</option>
      <option value="土木水利与建筑类">土木水利与建筑类</option>
      <option value="交通运输与航空航天类">交通运输与航空航天类</option>
      <option value="环境与安全科学类">环境与安全科学类</option>
      <option value="农学与食品科学类">农学与食品科学类</option>
      <option value="经济与管理类">经济与管理类</option>
      <option value="法学与政治学类">法学与政治学类</option>
      <option value="人文与教育类">人文与教育类</option>
      <option value="艺术与设计类">艺术与设计类</option>
      <option value="交叉学科类">交叉学科类</option>
      <option value="公共基础类">公共基础类</option>
      <option value="综合类">综合类</option>
    </select>
  </div>
  <div class="filter-group">
    <label>年级：</label>
    <select id="grade-filter">
      <option value="all">全部年级</option>
      <option value="大一">大一</option>
      <option value="大二">大二</option>
      <option value="大三">大三</option>
      <option value="大四">大四</option>
      <option value="通用">通用</option>
    </select>
  </div>
  <div class="filter-group">
    <label>类型：</label>
    <select id="type-filter">
      <option value="all">全部类型</option>
      <option value="视频课程">视频课程</option>
      <option value="课件讲义">课件讲义</option>
      <option value="书籍">书籍</option>
      <option value="习题试卷">习题试卷</option>
      <option value="其他">其他</option>
    </select>
  </div>
  <div class="filter-group">
    <label>排序：</label>
    <select id="search-sort">
      <option value="relevance">相关度</option>
      <option value="name-asc">名称升序</option>
      <option value="name-desc">名称降序</option>
      <option value="newest">最新发布</option>
      <option value="oldest">最早发布</option>
    </select>
  </div>
  <div class="search-box" style="position:relative;">
    <input type="text" id="resource-search" placeholder="搜索资源名称、作者、标签..." autocomplete="off">
    <button id="search-submit-btn"><i class="fas fa-search"></i></button>
    <button id="search-history-btn" title="搜索历史" style="margin-left:4px;background:var(--bg-alt);border:1px solid var(--border-color);border-radius:8px;padding:0 10px;cursor:pointer;color:var(--text-light);"><i class="fas fa-history"></i></button>
    <!-- 搜索建议下拉 -->
    <div id="search-suggestions" class="search-suggestions" style="display:none;"></div>
    <!-- 搜索历史下拉 -->
    <div id="search-history-dropdown" class="search-suggestions" style="display:none;"></div>
  </div>
</div>

<!-- 搜索加载动画 -->
<div id="search-loading" style="display:none;text-align:center;padding:1rem;color:var(--text-light);">
  <i class="fas fa-spinner fa-spin"></i> 搜索中...
</div>

<!-- 资源统计 -->
<div id="resource-count" style="margin-bottom:1rem;color:var(--text-light);font-size:0.9rem;"></div>

<!-- 资源网格 -->
<div class="resources-grid" id="resources-grid"></div>

<!-- 无结果提示 -->
<div class="state-message" id="no-results" style="display:none;">
  <i class="fas fa-search"></i>
  <p>没有找到匹配的资源，试试其他关键词？</p>
  <div id="no-results-recommend" style="margin-top:1rem;"></div>
</div>

<!-- 将 YAML 数据通过 Liquid 嵌入为 JSON -->
<script>
const allResources = [
  {% for r in site.data.resources %}
  {
    "id": {{ r.id }},
    "title": "{{ r.title | escape }}",
    "category": "{{ r.category }}",
    "subcategory": "{{ r.subcategory }}",
    "grade": "{{ r.grade }}",
    "type": "{{ r.type }}",
    "uploader": "{{ r.uploader }}",
    "date": "{{ r.date }}",
    "downloads": {{ r.downloads }},
    "description": "{{ r.description | escape }}",
    "link": "{{ r.link | relative_url }}",
    "tags": {{ r.tags | jsonify }}
  }{% unless forloop.last %},{% endunless %}
  {% endfor %}
];
</script>
<script src="{{ '/assets/js/favorites.js' | relative_url }}"></script>
<script src="{{ '/assets/js/lib/filter-resources.js' | relative_url }}"></script>
<script src="{{ '/assets/js/fuse.min.js' | relative_url }}"></script>
<script src="{{ '/assets/js/search-enhanced.js' | relative_url }}"></script>
<script src="{{ '/assets/js/resources.js' | relative_url }}"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
  var searchInput = document.getElementById('resource-search');
  var sortSelect = document.getElementById('search-sort');
  var suggestionsEl = document.getElementById('search-suggestions');
  var historyDropdown = document.getElementById('search-history-dropdown');
  var historyBtn = document.getElementById('search-history-btn');
  var loadingEl = document.getElementById('search-loading');
  var debounceTimer = null;

  // --- Search suggestions ---
  function showSuggestions(query) {
    if (!query || query.length < 1) { suggestionsEl.style.display = 'none'; return; }
    var results = TLSearch.suggest(query);
    if (results.length === 0) { suggestionsEl.style.display = 'none'; return; }
    suggestionsEl.innerHTML = results.map(function(s) {
      return '<div class="search-suggestion-item" data-text="' + (s.raw || s.text).replace(/"/g, '&quot;') + '">' +
        '<i class="fas ' + s.icon + '" style="width:16px;color:var(--text-lighter);"></i> ' +
        TLSearch.highlightMatch(s.text, query) +
        '<span class="search-suggestion-type">' + (s.type === 'author' ? '作者' : '资源') + '</span>' +
      '</div>';
    }).join('');
    suggestionsEl.style.display = 'block';
    suggestionsEl.querySelectorAll('.search-suggestion-item').forEach(function(item) {
      item.addEventListener('mousedown', function(e) {
        e.preventDefault();
        searchInput.value = this.dataset.text;
        suggestionsEl.style.display = 'none';
        performSearch();
      });
    });
  }

  // --- Search history ---
  function showHistory() {
    var hist = TLSearch.getHistory();
    if (hist.length === 0) { historyDropdown.innerHTML = '<div class="search-suggestion-item" style="color:var(--text-lighter);">暂无搜索历史</div>'; }
    else {
      historyDropdown.innerHTML = '<div class="search-suggestion-item" style="justify-content:space-between;"><span style="color:var(--text-lighter);font-size:.8rem;">搜索历史</span><span class="search-clear-history" style="cursor:pointer;color:var(--danger-color);font-size:.8rem;">清除</span></div>' +
        hist.map(function(h) {
          return '<div class="search-suggestion-item" data-text="' + h.replace(/"/g, '&quot;') + '">' +
            '<i class="fas fa-clock" style="width:16px;color:var(--text-lighter);"></i> ' + h +
          '</div>';
        }).join('');
      var clearBtn = historyDropdown.querySelector('.search-clear-history');
      if (clearBtn) clearBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        TLSearch.clearHistory();
        historyDropdown.style.display = 'none';
      });
    }
    historyDropdown.style.display = 'block';
    historyDropdown.querySelectorAll('.search-suggestion-item[data-text]').forEach(function(item) {
      item.addEventListener('mousedown', function(e) {
        e.preventDefault();
        searchInput.value = this.dataset.text;
        historyDropdown.style.display = 'none';
        performSearch();
      });
    });
  }

  historyBtn.addEventListener('click', function(e) {
    e.stopPropagation();
    if (historyDropdown.style.display === 'block') { historyDropdown.style.display = 'none'; return; }
    suggestionsEl.style.display = 'none';
    showHistory();
  });

  // Hide dropdowns on outside click
  document.addEventListener('click', function() {
    suggestionsEl.style.display = 'none';
    historyDropdown.style.display = 'none';
  });

  // --- Main search ---
  function performSearch() {
    var query = searchInput.value.trim();
    var sort = sortSelect.value;

    suggestionsEl.style.display = 'none';
    historyDropdown.style.display = 'none';

    if (!query) {
      // No query: show default filtered resources, clear highlight
      currentSearchQuery = '';
      if (typeof filterAndRender === 'function') filterAndRender();
      return;
    }

    // Save to history
    TLSearch.addToHistory(query);

    // Set current query for keyword highlighting
    currentSearchQuery = query;

    // Show loading
    loadingEl.style.display = 'block';

    // Small delay for UX feel
    setTimeout(function() {
      loadingEl.style.display = 'none';

      // Search resources
      var resResults = TLSearch.search(query, { section: 'resources', sort: sort });
      if (typeof renderResources === 'function') {
        renderResources(resResults);
      }
      // Update count
      var countEl = document.getElementById('resource-count');
      if (resResults.length > 0) {
        countEl.textContent = '找到 ' + resResults.length + ' 个资源';
      } else {
        countEl.textContent = '';
        // Show recommendations
        var noResults = document.getElementById('no-results');
        noResults.style.display = 'block';
        var recs = allResources.sort(function() { return Math.random() - 0.5; }).slice(0, 3);
        document.getElementById('no-results-recommend').innerHTML =
          '<p style="color:var(--text-light);font-size:.9rem;margin-bottom:.5rem;">也许你会喜欢：</p>' +
          recs.map(function(r) {
            return '<a href="' + r.link + '" class="btn btn-outline" style="margin:4px;font-size:.8rem;" target="_blank">' + r.title + '</a>';
          }).join('');
      }
    }, 300);
  }

  // Event bindings
  searchInput.addEventListener('input', function() {
    clearTimeout(debounceTimer);
    var val = this.value;
    debounceTimer = setTimeout(function() {
      showSuggestions(val);
    }, 200);
  });

  searchInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
      suggestionsEl.style.display = 'none';
      performSearch();
    }
  });

  document.getElementById('search-submit-btn').addEventListener('click', performSearch);
  sortSelect.addEventListener('change', performSearch);

  // Override the default filter to integrate with TLSearch
  var origFilter = window.filterAndRender || null;
  window.filterAndRender = function() {
    var query = searchInput.value.trim();
    if (query) {
      performSearch();
    } else {
      currentSearchQuery = '';
      if (origFilter) origFilter();
    }
  };
});
</script>
<script src="{{ '/assets/js/resource-agent.js' | relative_url }}"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
  if (typeof ResourceAgent !== 'undefined') ResourceAgent.init();
});
</script>
